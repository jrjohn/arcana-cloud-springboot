# Test Configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:arcana_test;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

# ORM selection for tests
database.orm=jpa
database.type=mysql

deployment.mode=monolithic
communication.protocol=http

jwt.secret=test-secret-key-for-testing-only-must-be-32-chars
jwt.expiration=3600000
jwt.refresh.expiration=86400000

# Disable gRPC server in tests (Spring gRPC)
spring.grpc.server.enabled=false

# Disable caching in tests
spring.cache.type=none

# Allow bean definition overriding for tests
spring.main.allow-bean-definition-overriding=true

# Disable Quartz scheduler in tests by default
quartz.enabled=false
spring.quartz.auto-startup=false

# Disable MongoDB in tests
spring.data.mongodb.auto-index-creation=false

# Disable Redis, Quartz, MongoDB for tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# Disable Spring Cloud Config
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
