# SonarQube Project Configuration

sonar.projectKey=arcana-cloud-springboot
sonar.projectName=Arcana Cloud Spring Boot

# Source directories
sonar.sources=src/main
sonar.tests=src/test

# Exclusions: test utility scripts + generated/infra code not part of business logic
sonar.exclusions=scripts/**

# Coverage exclusions: infrastructure / wiring / infra code that requires live services
sonar.coverage.exclusions=\
  **/ArcanaCloudApplication.java,\
  **/document/**,\
  **/config/**,\
  **/scheduler/**,\
  **/service/grpc/**,\
  **/service/client/**,\
  **/repository/impl/**,\
  **/dao/impl/**,\
  **/grpc/**

# JaCoCo XML report
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Java version
sonar.java.source=21

