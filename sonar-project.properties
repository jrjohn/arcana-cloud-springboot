# SonarQube Project Configuration

sonar.projectKey=arcana-cloud-springboot
sonar.projectName=Arcana Cloud Spring Boot

# Source directories
sonar.sources=src/main
sonar.tests=src/test

# Exclusions: test utility scripts are not production code
sonar.exclusions=scripts/**

# Java version
sonar.java.source=21

# Coverage exclusions: infrastructure/integration code that cannot be unit-tested
# without live MySQL/Redis/gRPC/Quartz connections
sonar.coverage.exclusions=\
  **/config/**,\
  **/scheduler/**,\
  **/service/grpc/**,\
  **/service/client/Grpc*,\
  **/dao/impl/jpa/repository/**,\
  **/dao/impl/mybatis/mapper/**,\
  **/ArcanaCloudApplication.java
